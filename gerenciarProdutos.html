<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/gerenciarProdutos.css">
    <link rel="stylesheet" href="css/varGlobais.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">

    <title>Gerenciamento de Sorvetes</title>
</head>

<body>
    <header>
        <img class="imagemLogo" src="https://i.postimg.cc/Hn2NvkPz/Chat-GPT-Image-7-de-mai-de-2026-08-58-35.png"
            alt="logo">
    </header>
    <h1>🍦 Gerenciamento de Sorvetes</h1>
    <nav>
        <a href="index.html">Início</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
        <a href="cardapio.html">Cardápio</a>
        <a href="formulario.html">Formulário</a>
    </nav>


    <main>

        <div class="form-container">

            <h2>Cadastro de Sorvetes</h2>

            <div class="form-group">
                <label for="inNome">Nome do Sorvete</label>
                <input type="text" id="inNome" placeholder="Ex: Copo Nuvem">
            </div>

            <div class="form-group">
                <label for="inTipo">Tipo de Produto</label>

                <select id="sltTipo">
                    <option value="1" selected disabled>Selecione o Tipo</option>
                    <option value="sorvete">Sorvete</option>
                    <option value="acai">Açaí</option>
                    <option value="milkshake">Milkshake</option>
                    <option value="especial">Especial da Casa</option>
                </select>
            </div>

            <div class="form-group">
                <label for="inSabor">Sabor</label>
                <select id="sltSabor">
                    <option value="1" selected disabled>Selecione o Sabor</option>
                    <option value="nuvemChocolate">Nuvem de Chocolate 🍫</option>
                    <option value="nuvemBaunilha">Nuvem de Baunilha 🤍</option>
                    <option value="nuvemMorango">Nuvem de Morango 🍓</option>
                    <option value="flocos">Flocos Celestiais 🍪</option>
                    <option value="cocoCremoso">Coco Cremoso 🥥</option>
                    <option value="maracuja">Maracujá Tropical 💛</option>
                    <option value="manga">Manga Doce 🧡</option>
                    <option value="uva">Uva 🍇</option>
                    <option value="limao">Limão 🍋</option>
                    <option value="abacaxi">Abacaxi 🍍</option>
                    <option value="manga">Manga 🧡</option>
                    <option value="leiteCondensado">Leite condensado 🥛</option>
                    <option value="ninhoComChocolate">Ninho com chocolate 🍫</option>
                    <option value="morangoCremoso">Morango cremoso 🍓</option>
                    <option value="doceDeLeite">Doce de leite 🤎</option>
                    <option value="coco">Coco 🥥</option>
                    <option value="banana">Banana 🍌</option>
                    <option value="chocolateSupremo">Chocolate Supremo 🍫</option>
                    <option value="baunilhaClassico">Baunilha Clássico 🤍</option>
                    <option value="ovomaltine">Ovomaltine 🤎</option>
                    <option value="cookiesAndCream">Cookies & Cream 🍪</option>
                </select>
            </div>

            <div class="form-group">
                <label for="inPreco">Preço (R$)</label>
                <input type="number" id="inPreco" min="0" step="0.01" placeholder="Ex: 12.50">
            </div>

            <div class="form-group" id="grupoFaixaPreco" hidden>
                <label for="sltFaixaPreco">Faixa de Preço</label>

                <select id="sltFaixaPreco">
                    <option value="1" selected disabled>Selecione Faixa de Preço</option>
                    <option value="todos">Todos</option>
                    <option value="baixo">Até R$ 10,00</option>
                    <option value="medio">R$ 10,01 até R$ 20,00</option>
                    <option value="alto">Acima de R$ 20,00</option>
                </select>
            </div>

            <div class="form-group">
                <label for="inEstoque">Quantidade em Estoque</label>
                <input type="number" id="inEstoque" min="0" placeholder="Ex: 25">
            </div>

            <div class="botoes">
                <button type="button" id="btCadastrar">Cadastrar</button>
                <button type="button" id="btMostrar">Mostrar Todos</button>
                <button type="button" id="btConsultar">Consultar</button>
                <button type="button" id="btConsultarFaixaPreco">Faixa de Preço</button>
            </div>

            <div class="form-container-Cadastro">

                <h2>Cadastro e Gerenciamento</h2>

                <div class="outCadastro lista-produtos" id="outCadastro"></div>

            </div>

        </div>

    </main>

    <footer>
        <p>&copy; 2026 - Sorveteria Nuvem | Projeto Integrador</p>
    </footer>

    <script src="js/gerenciarProdutos.js"></script>

</body>

</html>
