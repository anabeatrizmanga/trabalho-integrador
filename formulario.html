<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/formulario.css">
  <link rel="stylesheet" href="css/varGlobais.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">

  <title>Formulário</title>
</head>

<body>

  <img class="imagemLogo" src="https://i.postimg.cc/Hn2NvkPz/Chat-GPT-Image-7-de-mai-de-2026-08-58-35.png" alt="logo">
  <h2>🍦 Monte seu sorvete</h2>

  <nav>
    <ul>
      <li><a href="./index.html">Home</a></li>
      <li><a href="./sobre.html">🤍 Nuvem</a></li>
      <li><a href="./contato.html">📞 Contato</a></li>
      <li><a href="cardapio.html">🍓 Cardápio</a></li>
      <li><a class="gerenciarProdutos" href="./gerenciarProdutos.html">🔑 Gerenciar Produtos</a></li>
    </ul>
  </nav>

  <form id="formSorvete">

    <!-- Nome -->
    <label for="nomeDoUsuario">Nome:</label><br>
    <input type="text" id="inNome" placeholder="Digite seu nome" required
      oninvalid="this.setCustomValidity('Informe seu nome')" oninput="this.setCustomValidity('')" min="1"
      max="100"><br><br>

    <!--Tipo de Produto-->
    <label for="produtos">Escolha o tipo:</label><br>
    <select id="tipoDeProduto" required>
      <option value="" selected disabled>Selecione o Produto</option>
      <option value="sorvete">Sorvetes</option>
      <option value="chupchup">Chup-chups</option>
      <option value="picole">Picoles</option>
      <option value="açaí">Açais</option>
      <option value="milkshakes">Milkshakes</option>
      <option value="especiaisDaCasa">Especias da Casa</option>
    </select><br><br>
   
    <div id="divEspecial" hidden>
      <!--Tipos de Especiais da casa-->
      <label for="especiaisDaCasa">Selecione o especial da casa:</label><br>
      <select id="tipoDeEspeciaisDaCasa">
        <option value="" selected disabled>Selecione o Especial da Casa</option>
        <option value="sorvete">Copo Nuvem (3 bolas + cobertura)</option>
        <option value="chupchup">Sundae dos Céus</option>
        <option value="picole">Açaí Especial (com tudo)</option>
        <option value="açaí">Açaí de Chocolate (açaí + creme de chocolate + toppings)</option>
        <option value="milkshakeSupremoTopping">Milk Shake Supremo (com extra topping)</option>
      </select><br><br>
    
    </div>
    <!-- Sabor -->
    <label for="sabor">Escolha o sabor:</label><br>
    <select id="sabor" required>
      <option value="" selected disabled>Selecione o Sabor</option>
      <option value="nuvemChocolate">Nuvem de Chocolate 🍫</option>
      <option value="nuvemBaunilha">Nuvem de Baunilha 🤍</option>
      <option value="nuvemMorango">Nuvem de Morango 🍓</option>
      <option value="flocos">Flocos Celestiais 🍪</option>
      <option value="cocoCremoso">Coco Cremoso 🥥</option>
      <option value="maracuja">Maracujá Tropical 💛</option>
      <option value="manga">Manga Doce 🧡</option>
      <option value="uva">Uva 🍇</option>
      <option value="limao">Limão 🍋</option>
      <option value="abacaxi">Abacaxi 🍍</option>
      <option value="manga">Manga 🧡</option>
      <option value="leiteCondensado">Leite condensado 🥛</option>
      <option value="ninhoComChocolate">Ninho com chocolate 🍫</option>
      <option value="morangoCremoso">Morango cremoso 🍓</option>
      <option value="doceDeLeite">Doce de leite 🤎</option>
      <option value="coco">Coco 🥥</option>
      <option value="banana">Banana 🍌</option>
      <option value="chocolateSupremo">Chocolate Supremo 🍫</option>
      <option value="baunilhaClassico">Baunilha Clássico 🤍</option>
      <option value="ovomaltine">Ovomaltine 🤎</option>
      <option value="cookiesAndCream">Cookies & Cream 🍪</option>
    </select><br><br>

    <!-- Tamanho -->
    <label for="tamanho">Tamanho:</label><br>
    <input type="radio" name="tamanho" value="pequeno" required> Pequeno
    <input type="radio" name="tamanho" value="medio"> Médio
    <input type="radio" name="tamanho" value="grande"> Grande<br><br>

    <!-- Complementos -->
    <label for="complementos">Complementos:</label><br>
    <input type="checkbox" id="granulado" value="granulado">Granulado<br>
    <input type="checkbox" id="leiteCondensado" value="leiteCondensado">Leite Condensado<br>
    <input type="checkbox" id="nutella" value="nutella">Nutella<br>
    <input type="checkbox" id="caldaDeChocolate" value="caldaDeChocolate">Calda de Chocolate<br>
    <input type="checkbox" id="leiteEmPo" value="leiteEmPo">Leite em Pó<br>
    <input type="checkbox" id="banana" value="banana">Banana<br>
    <input type="checkbox" id="pacoca" value="pacoca">Paçoca<br>
    <input type="checkbox" id="confetes" value="confetes">Confetes<br><br>

    <!-- Endereço de Entrega -->
    <label for="endereco">Endereço de Entrega:</label><br>
    <input type="text" id="endereco" placeholder="Digite seu endereço completo, incluindo número e complemento" required
      oninvalid="this.setCustomValidity('Informe seu endereço')" oninput="this.setCustomValidity('')"><br><br>

    <!--Espaço para as obervações-->
    <label for="observarções">Observarções</label><br>
    <textarea name="ObservarçõesSorvetes" id="Observarcoes" rows="4" cols="30" required
      placeholder="Informe caso necessite de alguma alteração, caso não tenha nenhuma observação, escreva 'Sem Observações'"
      oninvalid="this.setCustomValidity('Informe caso necessite de alguma alteração')"
      oninput="this.setCustomValidity('')" minlength="1" maxlength="100"></textarea>

    <br><br>

    <!-- Botão -->
    <button type="button" id="btPedido">Fazer Pedido</button>

  </form>

  <h3 id="resultado"></h3>

  <footer>
    <p>&copy; 2026 - Sorveteria Nuvem | Projeto Integrador</p>
  </footer>

  <script src="./js/formulario.js"></script>

</body>

</html>
